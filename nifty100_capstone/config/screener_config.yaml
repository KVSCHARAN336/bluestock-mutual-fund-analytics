# Nifty 100 Financial Screener Configuration
# Analyst-editable threshold definitions

# ── 6 Preset Screeners ──

presets:
  quality_compounder:
    name: "Quality Compounder"
    description: "High ROE, low debt, positive FCF, strong revenue growth"
    filters:
      roe_min: 15.0
      de_max: 1.0
      fcf_min: 0
      revenue_cagr_5yr_min: 10.0

  value_pick:
    name: "Value Pick"
    description: "Low valuation multiples with reasonable debt and dividend yield"
    filters:
      pe_max: 25.0
      pb_max: 5.0
      de_max: 2.0
      dividend_yield_min: 0.5

  growth_accelerator:
    name: "Growth Accelerator"
    description: "High PAT and revenue growth with manageable debt"
    filters:
      pat_cagr_5yr_min: 20.0
      revenue_cagr_5yr_min: 15.0
      de_max: 2.0

  dividend_champion:
    name: "Dividend Champion"
    description: "High dividend yield, moderate payout, positive FCF"
    filters:
      dividend_yield_min: 2.0
      dividend_payout_max: 80.0
      fcf_min: 0

  debt_free_blue_chip:
    name: "Debt-Free Blue Chip"
    description: "Zero debt, strong ROE, large-cap revenue"
    filters:
      de_max: 0.01
      roe_min: 12.0
      sales_min: 5000.0

  turnaround_watch:
    name: "Turnaround Watch"
    description: "Revenue recovery, positive FCF, declining leverage"
    filters:
      revenue_cagr_3yr_min: 10.0
      fcf_min: 0
      de_declining: true

# ── Composite Score Weights ──

composite_score:
  profitability:
    weight: 0.35
    components:
      roe: 0.15
      roce: 0.10
      npm: 0.10
  cash_quality:
    weight: 0.30
    components:
      fcf_cagr: 0.15
      cfo_pat_ratio: 0.10
      fcf_positive: 0.05
  growth:
    weight: 0.20
    components:
      revenue_cagr: 0.10
      pat_cagr: 0.10
  leverage:
    weight: 0.15
    components:
      de_score: 0.10
      icr_score: 0.05
